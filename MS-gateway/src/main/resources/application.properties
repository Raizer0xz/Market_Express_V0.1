spring.application.name=ms-gateway
server.port=8083

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# Spring Cloud Gateway - integracion con Eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# =========================================================
# RUTAS DEL GATEWAY
# =========================================================

# /auth/** -> MS-SEGURIDAD (SIN filtro JWT - aqui se obtiene el token)
spring.cloud.gateway.routes[0].id=ms-seguridad
spring.cloud.gateway.routes[0].uri=lb://MS-SEGURIDAD
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# /usuarios/** -> MS-USUARIOS (CON filtro JWT)
spring.cloud.gateway.routes[1].id=ms-usuarios
spring.cloud.gateway.routes[1].uri=lb://MS-USUARIOS
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/usuarios/**
spring.cloud.gateway.routes[1].filters[0]=JwtAuthFilter

# /sucursales/** -> MS-SUCURSALES (CON filtro JWT)
spring.cloud.gateway.routes[2].id=ms-sucursales
spring.cloud.gateway.routes[2].uri=lb://MS-SUCURSALES
spring.cloud.gateway.routes[2].predicates[0]=Path=/sucursales/**
spring.cloud.gateway.routes[2].filters[0]=JwtAuthFilter

