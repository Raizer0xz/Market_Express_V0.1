# JWT Secret (debe coincidir exactamente con el de MS-SEGURIDAD)
jwt.secret=MarketExpressClaveJWT2024SecureX

# Logging
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.example.MS_gateway=DEBUG